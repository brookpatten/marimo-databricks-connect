# Databricks Apps manifest for the marimo-databricks notebook browser.
#
# Deploy with the Databricks CLI:
#
#     databricks sync --watch . /Workspace/Users/<you>/marimo-databricks-app
#     databricks apps deploy marimo-databricks \
#         --source-code-path /Workspace/Users/<you>/marimo-databricks-app
#
# See https://learn.microsoft.com/en-us/azure/databricks/dev-tools/databricks-apps/
# for the full deployment workflow.

command:
  - "python"
  - "-m"
  - "marimo_databricks_connect.app"

env:
  # Persist exported notebooks across requests in the app's writable area.
  # NB: must NOT be under /tmp/ or /var/folders/ — the marimo frontend
  # treats those as non-persistent and pops up a Save-As dialog every
  # time the user clicks Save (see marimo's edit-page bundle, function
  # `la(e)`). /var/tmp/ is writable in Apps containers and avoids that
  # heuristic.
  - name: MDC_APP_NOTEBOOK_CACHE
    value: "/var/tmp/mdc-notebooks"
  - name: LOG_LEVEL
    value: "info"

# On-behalf-of-user authorization. The scopes below are forwarded to the
# user's OAuth token (X-Forwarded-Access-Token) which the app uses to call
# the Workspace API and Spark Connect as the end user.
#
# https://learn.microsoft.com/en-us/azure/databricks/dev-tools/databricks-apps/auth
user_authorization:
  scopes:
    - "all-apis"
